{% comment %}
Makwanpur District Nepal — Leaflet map — exact pinpointing delivery
Center: Hetauda 27.4287, 85.0320
Bounds restricted to Makwanpur district approx (Lat: 27.15-27.65, Lon: 84.65-85.35)
{% endcomment %}
<div id="makwanpur-map-{{ map_id|default:'main' }}" style="height: {{ height|default:'380px' }};" class="w-full rounded-stall border border-neutral-300 z-10"></div>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
(function(){
  const mapEl = 'makwanpur-map-{{ map_id|default:"main" }}';
  const defaultLat = {{ lat|default:"27.4287" }};
  const defaultLon = {{ lon|default:"85.0320" }};
  const isReadonly = {{ readonly|default:"false"|lower }} === true;

  const latInput = document.querySelector('input[name="latitude"], #id_latitude');
  const lonInput = document.querySelector('input[name="longitude"], #id_longitude');
  let initLat = latInput && latInput.value ? parseFloat(latInput.value) : defaultLat;
  let initLon = lonInput && lonInput.value ? parseFloat(lonInput.value) : defaultLon;
  if (isNaN(initLat)) initLat = defaultLat;
  if (isNaN(initLon)) initLon = defaultLon;

  const map = L.map(mapEl, {
    center: [initLat, initLon],
    zoom: {{ zoom|default:13 }},
    maxBounds: [[27.15, 84.65], [27.65, 85.35]], // Makwanpur district bounds approx
    maxBoundsViscosity: 0.8,
    minZoom: 10,
    maxZoom: 18
  });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap • Makwanpur Mart Hetauda',
    maxZoom: 19
  }).addTo(map);

  // Hetauda wards markers
  const wards = [
    {n:1, lat:27.440, lon:85.020, name:'Ward 1 – Buddha Chowk'},
    {n:2, lat:27.435, lon:85.028, name:'Ward 2 – Bank Road'},
    {n:4, lat:27.4287, lon:85.0320, name:'Ward 4 – Main Bazaar'},
    {n:5, lat:27.422, lon:85.035, name:'Ward 5'},
    {n:10, lat:27.410, lon:85.045, name:'Ward 10 – Industrial'},
  ];
  wards.forEach(w=>{
    L.circleMarker([w.lat, w.lon], {radius:5, color:'#1F4B3F', fillColor:'#F0A202', fillOpacity:0.8, weight:2})
      .addTo(map).bindPopup(`<strong>${w.name}</strong><br>Hyperlocal 2-4hr delivery`);
  });

  // draggable pin — delivery pinpointing
  let pin = L.marker([initLat, initLon], {draggable: !isReadonly}).addTo(map);
  if (!isReadonly) {
    pin.bindPopup('Drag to exact delivery point inside Makwanpur District<br><small>Makwanpur Mart Hetauda</small>').openPopup();
  } else {
    pin.bindPopup('Exact Delivery GPS Pinpoint<br><small>Makwanpur District, Nepal</small>').openPopup();
  }

  function validateBounds(lat, lon) {
    return lat >= 27.15 && lat <= 27.65 && lon >= 84.65 && lon <= 85.35;
  }

  function updateLatLng(newLat, newLon){
    if (!validateBounds(newLat, newLon)) {
      alert("Location outside Makwanpur District bounds! Delivery exact pinpointing is restricted to Makwanpur District, Nepal.");
      return false;
    }
    pin.setLatLng([newLat, newLon]);
    if(latInput) latInput.value = newLat.toFixed(6);
    if(lonInput) lonInput.value = newLon.toFixed(6);
    // update text displays if present
    const latDisp = document.getElementById('lat-display');
    const lonDisp = document.getElementById('lon-display');
    if(latDisp) latDisp.textContent = newLat.toFixed(6);
    if(lonDisp) lonDisp.textContent = newLon.toFixed(6);
    return true;
  }

  if (!isReadonly) {
    // initialize input values if inputs exist and empty
    if (latInput && !latInput.value) latInput.value = initLat.toFixed(6);
    if (lonInput && !lonInput.value) lonInput.value = initLon.toFixed(6);

    let lastValidLat = initLat;
    let lastValidLon = initLon;

    pin.on('dragend', function(e){
      const ll = pin.getLatLng();
      if (updateLatLng(ll.lat, ll.lng)) {
        lastValidLat = ll.lat;
        lastValidLon = ll.lng;
      } else {
        pin.setLatLng([lastValidLat, lastValidLon]);
      }
    });

    map.on('click', function(e){
      if (updateLatLng(e.latlng.lat, e.latlng.lng)) {
        lastValidLat = e.latlng.lat;
        lastValidLon = e.latlng.lng;
      }
    });

    // try browser geolocation (with permission)
    if(navigator.geolocation && {{ enable_geolocate|default:"true"|lower }}){
      navigator.geolocation.getCurrentPosition(pos=>{
        const userLat = pos.coords.latitude;
        const userLon = pos.coords.longitude;
        if(validateBounds(userLat, userLon)){
          map.setView([userLat, userLon], 15);
          updateLatLng(userLat, userLon);
          lastValidLat = userLat;
          lastValidLon = userLon;
          L.circle([userLat, userLon], {radius: pos.coords.accuracy, color:'#3D3763', fillOpacity:0.1, weight:1}).addTo(map)
            .bindPopup('Your GPS location inside Makwanpur District');
        }
      }, ()=>{}, {enableHighAccuracy:true, timeout:5000});
    }
  }

  // expose for other scripts
  window.makwanpurMap = map;
  window.makwanpurPin = pin;
})();
</script>
<style>
/* Leaflet tailwind collision fix */
.leaflet-container { font-family: 'Hind', sans-serif; }
.leaflet-control-attribution { font-size: 10px !important; }
</style>
